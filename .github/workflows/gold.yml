name: Gold Reliability

on:
    push:
    pull_request:

jobs:
    reliability-gold:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.13"

            - name: Install uv
              run: python -m pip install --upgrade pip uv

            - name: Install dependencies
              run: uv sync --extra dev

            - name: Run unit and integration tests with Gold coverage
              run: uv run pytest tests/unit tests/integration --cov=app --cov-report=term-missing --cov-fail-under=70

    deploy:
        needs: reliability-gold
        runs-on: ubuntu-latest
        steps:
            - name: Simulated Deploy
              run: echo "Simulating deployment. This only runs if tests pass!"
